<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPIH 도입 점포 리스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    color: #111;
    padding: 40px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 32px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead th {
    background: #111;
    color: #fff;
    font-weight: 600;
    text-align: left;
    padding: 12px 16px;
    font-size: 13px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid #e5e5e5;
    transition: background 0.15s;
  }
  tbody tr:hover {
    background: #f5f5f5;
  }
  tbody td {
    padding: 10px 16px;
    vertical-align: middle;
  }
  td.no {
    font-weight: 600;
    color: #888;
    width: 40px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-domestic {
    background: #111;
    color: #fff;
  }
  .badge-overseas {
    background: #e5e5e5;
    color: #333;
  }
  td.country { font-weight: 500; }
  td.store-name { font-weight: 600; }
  td a {
    color: #111;
    text-decoration: none;
    border-bottom: 1px solid #ccc;
    transition: border-color 0.15s;
  }
  td a:hover { border-bottom-color: #111; }
  .stats {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
  }
  .stat-box { padding: 16px 0; }
  .stat-number { font-size: 32px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
  .loading {
    text-align: center;
    padding: 60px 0;
    color: #888;
    font-size: 14px;
  }
  @media (max-width: 768px) {
    body { padding: 20px 12px; }
    table { font-size: 12px; }
    thead th, tbody td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<h1 id="title">PPIH 도입 점포 리스트</h1>
<p class="subtitle" id="subtitle">Loading...</p>

<div class="stats">
  <div class="stat-box">
    <div class="stat-number" id="stat-total">-</div>
    <div class="stat-label">전체 점포</div>
  </div>
  <div class="stat-box">
    <div class="stat-number" id="stat-domestic">-</div>
    <div class="stat-label">일본 전개</div>
  </div>
  <div class="stat-box">
    <div class="stat-number" id="stat-overseas">-</div>
    <div class="stat-label">해외 전개</div>
  </div>
</div>

<div id="table-container">
  <p class="loading">데이터를 불러오는 중...</p>
</div>

<script>
const SHEET_ID = '10o_sVjaxSOB9HfIBEXZ1z1w51V9qI2_Z-cgSc69ZpJc';
const GID = '1287401047';
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

fetch(URL)
  .then(res => res.text())
  .then(text => {
    // Google returns JSONP-like response, strip wrapper
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows;

    // Row 0 = title row, Row 2 = header, Row 3+ = data
    const titleText = rows[0]?.c?.[0]?.v || 'PPIH 도입 점포 리스트';
    const dateMatch = titleText.match(/\d{8}/);
    const dateStr = dateMatch ? `${dateMatch[0].slice(0,4)}.${dateMatch[0].slice(4,6)}.${dateMatch[0].slice(6,8)}` : '';

    document.getElementById('subtitle').textContent = `Updated: ${dateStr} · 구글시트 실시간 연동`;

    // Parse data rows (starting from row index 3)
    const data = [];
    for (let i = 3; i < rows.length; i++) {
      const r = rows[i];
      if (!r.c || !r.c[0] || !r.c[0].v) continue;
      data.push({
        no: r.c[0]?.v || '',
        category: r.c[1]?.v || '',
        country: r.c[2]?.v || '',
        name: r.c[3]?.v || '',
        url: r.c[4]?.v || ''
      });
    }

    // Stats
    const domestic = data.filter(d => d.category === '国内法人').length;
    const overseas = data.filter(d => d.category === '海外法人').length;
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-domestic').textContent = domestic;
    document.getElementById('stat-overseas').textContent = overseas;

    // Country mapping
    const countryMap = {
      '日本': '일본', 'カルフォルニア': '미국 (캘리포니아)', 'カリフォルニア': '미국 (캘리포니아)',
      'グアム': '괌', 'ハワイ': '미국 (하와이)', 'タイ': '태국', '香港': '홍콩'
    };

    // Build table
    let html = `<table>
      <thead><tr>
        <th>No</th><th>구분</th><th>국가</th><th>점포명</th><th>링크</th>
      </tr></thead><tbody>`;

    data.forEach(d => {
      const isDomestic = d.category === '国内法人';
      const badgeClass = isDomestic ? 'badge-domestic' : 'badge-overseas';
      const badgeText = isDomestic ? '일본 전개' : '해외 전개';
      const country = countryMap[d.country] || d.country;
      const link = d.url ? `<a href="${d.url}" target="_blank">Link</a>` : '';

      html += `<tr>
        <td class="no">${d.no}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td class="country">${country}</td>
        <td class="store-name">${d.name}</td>
        <td>${link}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    document.getElementById('table-container').innerHTML = html;
  })
  .catch(err => {
    document.getElementById('table-container').innerHTML =
      `<p class="loading">데이터 로딩 실패. 새로고침 해주세요.</p>`;
    console.error(err);
  });
</script>

</body>
</html>
